version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  auth-service:
    build: ./backend/auth-service
    ports:
      - "4001:4001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/habittracker
      - JWT_SECRET=habitflow_secret_key_123
    depends_on:
      - mongodb

  habit-service:
    build: ./backend/habit-service
    ports:
      - "4002:4002"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/habittracker
    depends_on:
      - mongodb

  analytics-service:
    build: ./backend/analytics-service
    ports:
      - "4003:4003"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/habittracker
    depends_on:
      - mongodb

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "4000:4000"
    environment:
      - JWT_SECRET=habitflow_secret_key_123
    depends_on:
      - auth-service
      - habit-service
      - analytics-service

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - api-gateway

volumes:
  mongodb_data:
